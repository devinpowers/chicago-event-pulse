name: Deploy Chicago Event Pulse

on:
  workflow_dispatch:

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        run: |
          python -m compileall function_app.py src tests
          python -c "import function_app; print('function_app import ok')"
          pytest

  deploy:
    name: Terraform and Function Deploy
    runs-on: ubuntu-latest
    needs: test
    environment: dev

    env:
      TF_VAR_subscription_id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      TF_VAR_ticketmaster_api_key: ${{ secrets.TICKETMASTER_API_KEY }}
      TF_VAR_seatgeek_client_id: ${{ secrets.SEATGEEK_CLIENT_ID }}
      TF_VAR_sendgrid_api_key: ${{ secrets.SENDGRID_API_KEY }}
      TF_VAR_daily_email_to: ${{ secrets.DAILY_EMAIL_TO }}
      TF_VAR_daily_email_from: ${{ secrets.DAILY_EMAIL_FROM }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Terraform fmt
        working-directory: infra
        run: terraform fmt -check

      - name: Terraform init
        working-directory: infra
        run: terraform init

      - name: Terraform validate
        working-directory: infra
        run: terraform validate

      - name: Terraform plan
        working-directory: infra
        run: terraform plan -out=tfplan

      - name: Terraform apply
        working-directory: infra
        run: terraform apply -auto-approve tfplan

      - name: Read Terraform outputs
        id: tfout
        working-directory: infra
        run: |
          echo "function_app_name=$(terraform output -raw function_app_name)" >> "$GITHUB_OUTPUT"

      - name: Prepare function package
        run: |
          mkdir function-package
          cp function_app.py host.json requirements.txt function-package/
          cp -R src function-package/src

      - name: Set up function build Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install function dependencies
        run: |
          python -m pip install --upgrade pip
          pip install --target="function-package/.python_packages/lib/site-packages" -r requirements.txt

      - name: Smoke test function package
        run: |
          PYTHONPATH="function-package/.python_packages/lib/site-packages" python - <<'PY'
          import function_app

          functions = sorted(fn.get_function_name() for fn in function_app.app.get_functions())
          expected = ["daily_events_timer", "run_digest"]
          if functions != expected:
              raise SystemExit(f"Expected {expected}, got {functions}")

          print(f"Indexed functions: {functions}")
          PY

      - name: Deploy Azure Function
        uses: Azure/functions-action@v1
        with:
          app-name: ${{ steps.tfout.outputs.function_app_name }}
          package: "function-package"
